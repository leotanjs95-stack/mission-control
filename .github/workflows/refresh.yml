name: Refresh Mission Control

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:           # manual "Run workflow" button
  push:
    branches: [ main ]         # refresh on every deploy

permissions:
  contents: write              # allow committing data/status.json

concurrency:
  group: mission-control-refresh
  cancel-in-progress: false

env:
  SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --no-audit --no-fund
      - name: Build status.json
        run: node refresh.mjs
      - name: Commit if changed
        run: |
          git config user.name  "mission-control-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/status.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh status [skip ci]"
            git push
          fi
